repos:
  # Ruff — lint and format (replaces flake8, isort, pyupgrade, and more)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]          # auto-fix safe violations on commit
      - id: ruff-format        # opinionated formatter (like black)

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements    # catches leftover breakpoint() / pdb.set_trace()
