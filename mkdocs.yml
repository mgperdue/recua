site_name: recua
site_description: Embeddable pure-Python concurrent file transfer engine
site_url: https://youruser.github.io/recua
repo_url: https://github.com/youruser/recua
repo_name: youruser/recua

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: quickstart.md
    - Installation: installation.md
  - User Guide:
    - Core concepts: guide/concepts.md
    - Configuration: guide/configuration.md
    - Checksums: guide/checksums.md
    - Progress display: guide/progress.md
    - CLI reference: guide/cli.md
  - API Reference: api.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
