<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="960" height="420" fill="#ffffff"/>

  <!-- ── Progress bar stack (left panel) ── -->
  <!-- Spine -->
  <line x1="80" y1="90" x2="80" y2="310" stroke="#534AB7" stroke-width="3" stroke-linecap="round"/>

  <!-- Bar 1 — 100% purple -->
  <rect x="80" y="90"  width="226" height="20" rx="10" fill="#e8e6f7"/>
  <rect x="80" y="90"  width="226" height="20" rx="10" fill="#534AB7"/>
  <circle cx="316" cy="100" r="4.5" fill="#7F77DD" opacity=".9"/>

  <!-- Bar 2 — 78% teal -->
  <rect x="80" y="122" width="226" height="20" rx="10" fill="#e8e6f7" opacity=".4"/>
  <rect x="80" y="122" width="176" height="20" rx="10" fill="#0F6E56"/>
  <circle cx="316" cy="132" r="4.5" fill="#1D9E75" opacity=".75"/>

  <!-- Bar 3 — 55% coral -->
  <rect x="80" y="154" width="226" height="20" rx="10" fill="#e8e6f7" opacity=".4"/>
  <rect x="80" y="154" width="124" height="20" rx="10" fill="#993C1D"/>
  <circle cx="316" cy="164" r="4.5" fill="#D85A30" opacity=".6"/>

  <!-- Bar 4 — 32% blue -->
  <rect x="80" y="186" width="226" height="20" rx="10" fill="#e8e6f7" opacity=".4"/>
  <rect x="80" y="186" width="72"  height="20" rx="10" fill="#185FA5"/>
  <circle cx="316" cy="196" r="4.5" fill="#378ADD" opacity=".45"/>

  <!-- Bar 5 — 10% amber -->
  <rect x="80" y="218" width="226" height="20" rx="10" fill="#e8e6f7" opacity=".4"/>
  <rect x="80" y="218" width="26"  height="20" rx="10" fill="#854F0B"/>
  <circle cx="316" cy="228" r="4.5" fill="#EF9F27" opacity=".3"/>

  <!-- ── Pack mule (center) ── -->
  <!-- Ground shadow -->
  <ellipse cx="400" cy="322" rx="54" ry="7" fill="#534AB7" opacity=".07"/>

  <!-- Cargo crates -->
  <rect x="372" y="120" width="40" height="26" rx="4" fill="#534AB7"/>
  <line x1="372" y1="133" x2="412" y2="133" stroke="#7F77DD" stroke-width="0.8" opacity=".6"/>
  <line x1="392" y1="120" x2="392" y2="146" stroke="#7F77DD" stroke-width="0.8" opacity=".6"/>
  <rect x="369" y="146" width="46" height="24" rx="4" fill="#0F6E56"/>
  <rect x="365" y="170" width="54" height="20" rx="4" fill="#993C1D"/>

  <!-- Strap -->
  <path d="M365 180 Q392 187 419 180" fill="none" stroke="#EF9F27" stroke-width="2.2" stroke-linecap="round" opacity=".7"/>

  <!-- Body -->
  <ellipse cx="392" cy="240" rx="48" ry="32" fill="#e8e4da" stroke="#c4bfb2" stroke-width="1"/>

  <!-- Neck -->
  <path d="M420 222 Q438 208 442 190 Q444 178 438 170" fill="none" stroke="#c4bfb2" stroke-width="10" stroke-linecap="round"/>
  <path d="M420 222 Q438 208 442 190 Q444 178 438 170" fill="none" stroke="#e8e4da" stroke-width="7" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="442" cy="162" rx="20" ry="16" fill="#e8e4da" stroke="#c4bfb2" stroke-width="1"/>

  <!-- Snout -->
  <ellipse cx="458" cy="169" rx="12" ry="9" fill="#e8e4da" stroke="#c4bfb2" stroke-width="1"/>
  <circle cx="467" cy="171" r="2.2" fill="#534AB7" opacity=".35"/>

  <!-- Eye -->
  <circle cx="447" cy="156" r="3.5" fill="#534AB7" opacity=".65"/>
  <circle cx="448" cy="155" r="1.4" fill="#EEEDFE" opacity=".85"/>

  <!-- Ears -->
  <path d="M433 148 Q428 132 436 129 Q441 134 438 148Z" fill="#d8d3c7" stroke="#c4bfb2" stroke-width="0.7"/>
  <path d="M443 145 Q442 129 450 128 Q454 134 450 145Z" fill="#d8d3c7" stroke="#c4bfb2" stroke-width="0.7"/>

  <!-- Tail -->
  <path d="M345 232 Q324 224 322 238 Q323 252 336 247" fill="none" stroke="#c4bfb2" stroke-width="6" stroke-linecap="round"/>
  <path d="M345 232 Q324 224 322 238 Q323 252 336 247" fill="none" stroke="#e8e4da" stroke-width="4" stroke-linecap="round"/>
  <path d="M336 247 Q330 258 328 266" fill="none" stroke="#c4bfb2" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Legs (walking pose) -->
  <!-- Back left forward -->
  <path d="M364 270 L358 300 L355 318" fill="none" stroke="#c4bfb2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M364 270 L358 300 L355 318" fill="none" stroke="#e8e4da" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="355" cy="320" rx="7" ry="4" fill="#534AB7" opacity=".3"/>
  <!-- Back right back -->
  <path d="M374 272 L379 302 L382 318" fill="none" stroke="#c4bfb2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M374 272 L379 302 L382 318" fill="none" stroke="#e8e4da" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="382" cy="320" rx="7" ry="4" fill="#534AB7" opacity=".3"/>
  <!-- Front left back -->
  <path d="M406 268 L403 300 L401 318" fill="none" stroke="#c4bfb2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M406 268 L403 300 L401 318" fill="none" stroke="#e8e4da" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="401" cy="320" rx="7" ry="4" fill="#534AB7" opacity=".3"/>
  <!-- Front right forward -->
  <path d="M418 266 L428 298 L434 316" fill="none" stroke="#c4bfb2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M418 266 L428 298 L434 316" fill="none" stroke="#e8e4da" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="434" cy="317" rx="7" ry="4" fill="#534AB7" opacity=".3"/>

  <!-- ── Wordmark (right panel) ── -->
  <text x="510" y="220"
        font-family="Arial, Helvetica, sans-serif"
        font-size="96"
        font-weight="500"
        letter-spacing="-2"
        fill="#1a1a18">recua</text>

  <!-- Accent line -->
  <line x1="510" y1="238" x2="892" y2="238" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".35"/>

  <!-- Tagline -->
  <text x="510" y="264"
        font-family="Arial, Helvetica, sans-serif"
        font-size="17"
        font-weight="400"
        letter-spacing="4"
        fill="#888780">CONCURRENT FILE TRANSFER</text>

  <!-- Version pill -->
  <rect x="510" y="284" width="64" height="26" rx="13" fill="#534AB7" opacity=".12"/>
  <text x="542" y="302"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        font-weight="500"
        fill="#534AB7">v0.1</text>
</svg>
