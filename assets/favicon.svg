<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#534AB7"/>

  <!-- Miniature progress bars — 3 bars only at favicon scale -->
  <!-- Bar 1 full -->
  <rect x="3" y="7"  width="13" height="3" rx="1.5" fill="#ffffff" opacity=".95"/>
  <!-- Bar 2 ~65% -->
  <rect x="3" y="12" width="13" height="3" rx="1.5" fill="#ffffff" opacity=".2"/>
  <rect x="3" y="12" width="8"  height="3" rx="1.5" fill="#ffffff" opacity=".75"/>
  <!-- Bar 3 ~30% -->
  <rect x="3" y="17" width="13" height="3" rx="1.5" fill="#ffffff" opacity=".2"/>
  <rect x="3" y="17" width="4"  height="3" rx="1.5" fill="#ffffff" opacity=".5"/>

  <!-- Mule silhouette — simplified to pure shape at 32px -->
  <!-- Body -->
  <ellipse cx="22" cy="19" rx="5.5" ry="3.5" fill="#ffffff" opacity=".9"/>
  <!-- Neck + head as single path -->
  <path d="M25 17 Q27 14 27 12 Q27 10 26 9" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity=".9"/>
  <circle cx="25.5" cy="8.5" r="2.5" fill="#ffffff" opacity=".9"/>
  <!-- Cargo dot on back -->
  <rect x="19" y="13" width="5" height="4" rx="1" fill="#EF9F27" opacity=".9"/>
  <!-- Legs (just two strokes at this size) -->
  <line x1="19" y1="22" x2="18" y2="28" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity=".8"/>
  <line x1="25" y1="22" x2="26" y2="28" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity=".8"/>
</svg>
